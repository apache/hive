version: "2"
services:
  namenode:
    image: apache/hadoop:3.4.2
    hostname: namenode
    command: ["hdfs", "namenode"]
    env_file:
      - ./config
    environment:
      ENSURE_NAMENODE_DIR: "/tmp/hadoop-hadoop/dfs/name"
    ports:
      - "9870:9870"
      - "8020:8020"
    networks:
      - hive-yarn-it

  datanode:
    image: apache/hadoop:3.4.2
    command: ["hdfs", "datanode"]
    env_file:
      - ./config
    depends_on:
      - namenode
    networks:
      - hive-yarn-it

  resourcemanager:
    image: apache/hadoop:3.4.2
    hostname: resourcemanager
    command: ["yarn", "resourcemanager"]
    env_file:
      - ./config
    ports:
      - "8088:8088"
      - "8032:8032"
    depends_on:
      - namenode
    networks:
      - hive-yarn-it

  nodemanager:
    image: apache/hadoop:3.4.2
    command: ["yarn", "nodemanager"]
    env_file:
      - ./config
    ports:
      - "8042:8042"
    depends_on:
      - resourcemanager
    networks:
      - hive-yarn-it

networks:
  hive-yarn-it:
    name: hive-yarn-it
