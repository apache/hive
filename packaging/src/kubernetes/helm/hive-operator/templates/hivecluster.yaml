{{- if .Values.cluster.enabled }}
apiVersion: hive.apache.org/v1
kind: HiveCluster
metadata:
  name: {{ include "hive-operator.clusterName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "hive-operator.labels" . | nindent 4 }}
spec:
  image: {{ .Values.cluster.image }}
  imagePullPolicy: {{ .Values.cluster.imagePullPolicy }}

  metastore:
    enabled: {{ .Values.cluster.metastore.enabled }}
    {{- if .Values.cluster.metastore.enabled }}
    replicas: {{ .Values.cluster.metastore.replicas }}
    warehouseDir: {{ .Values.cluster.metastore.warehouseDir | quote }}
    database:
      type: {{ .Values.cluster.database.type | quote }}
      {{- if .Values.cluster.database.url }}
      url: {{ .Values.cluster.database.url | quote }}
      {{- end }}
      {{- if .Values.cluster.database.driver }}
      driver: {{ .Values.cluster.database.driver | quote }}
      {{- end }}
      {{- if .Values.cluster.database.username }}
      username: {{ .Values.cluster.database.username | quote }}
      {{- end }}
      {{- if and .Values.cluster.database.passwordSecretRef .Values.cluster.database.passwordSecretRef.name }}
      passwordSecretRef:
        name: {{ .Values.cluster.database.passwordSecretRef.name | quote }}
        key: {{ .Values.cluster.database.passwordSecretRef.key | default "password" | quote }}
      {{- end }}
      {{- if .Values.cluster.database.driverJarUrl }}
      driverJarUrl: {{ .Values.cluster.database.driverJarUrl | quote }}
      {{- end }}
    {{- if .Values.cluster.metastore.resources }}
    resources:
      {{- toYaml .Values.cluster.metastore.resources | nindent 6 }}
    {{- end }}
    {{- if .Values.cluster.metastore.configOverrides }}
    configOverrides:
      {{- toYaml .Values.cluster.metastore.configOverrides | nindent 6 }}
    {{- end }}
    {{- if .Values.cluster.metastore.extraVolumes }}
    extraVolumes:
      {{- toYaml .Values.cluster.metastore.extraVolumes | nindent 6 }}
    {{- end }}
    {{- if .Values.cluster.metastore.extraVolumeMounts }}
    extraVolumeMounts:
      {{- toYaml .Values.cluster.metastore.extraVolumeMounts | nindent 6 }}
    {{- end }}
    {{- if and .Values.cluster.metastore.autoscaling .Values.cluster.metastore.autoscaling.enabled }}
    autoscaling:
      enabled: true
      minReplicas: {{ .Values.cluster.metastore.autoscaling.minReplicas }}
      scaleUpThreshold: {{ .Values.cluster.metastore.autoscaling.scaleUpThreshold }}
      scaleUpStabilizationSeconds: {{ .Values.cluster.metastore.autoscaling.scaleUpStabilizationSeconds }}
      scaleDownStabilizationSeconds: {{ .Values.cluster.metastore.autoscaling.scaleDownStabilizationSeconds }}
      gracePeriodSeconds: {{ .Values.cluster.metastore.autoscaling.gracePeriodSeconds }}
      metricsScrapeIntervalSeconds: {{ .Values.cluster.metastore.autoscaling.metricsScrapeIntervalSeconds | default 10 }}
      cpuScaleUpThreshold: {{ .Values.cluster.metastore.autoscaling.cpuScaleUpThreshold | default 90 }}
      cpuScaleDownThreshold: {{ .Values.cluster.metastore.autoscaling.cpuScaleDownThreshold | default 30 }}
    {{- end }}
    {{- else }}
    {{- if .Values.cluster.metastore.externalUri }}
    externalUri: {{ .Values.cluster.metastore.externalUri | quote }}
    {{- end }}
    {{- end }}

  hiveServer2:
    replicas: {{ .Values.cluster.hiveServer2.replicas }}
    serviceType: {{ .Values.cluster.hiveServer2.serviceType | quote }}
    {{- if .Values.cluster.hiveServer2.resources }}
    resources:
      {{- toYaml .Values.cluster.hiveServer2.resources | nindent 6 }}
    {{- end }}
    {{- if .Values.cluster.hiveServer2.configOverrides }}
    configOverrides:
      {{- toYaml .Values.cluster.hiveServer2.configOverrides | nindent 6 }}
    {{- end }}
    {{- if .Values.cluster.hiveServer2.externalJars }}
    externalJars:
      {{- toYaml .Values.cluster.hiveServer2.externalJars | nindent 6 }}
    {{- end }}
    {{- if .Values.cluster.hiveServer2.extraVolumes }}
    extraVolumes:
      {{- toYaml .Values.cluster.hiveServer2.extraVolumes | nindent 6 }}
    {{- end }}
    {{- if .Values.cluster.hiveServer2.extraVolumeMounts }}
    extraVolumeMounts:
      {{- toYaml .Values.cluster.hiveServer2.extraVolumeMounts | nindent 6 }}
    {{- end }}
    {{- if and .Values.cluster.hiveServer2.autoscaling .Values.cluster.hiveServer2.autoscaling.enabled }}
    autoscaling:
      enabled: true
      minReplicas: {{ .Values.cluster.hiveServer2.autoscaling.minReplicas }}
      scaleUpThreshold: {{ .Values.cluster.hiveServer2.autoscaling.scaleUpThreshold }}
      scaleUpStabilizationSeconds: {{ .Values.cluster.hiveServer2.autoscaling.scaleUpStabilizationSeconds }}
      scaleDownStabilizationSeconds: {{ .Values.cluster.hiveServer2.autoscaling.scaleDownStabilizationSeconds }}
      gracePeriodSeconds: {{ .Values.cluster.hiveServer2.autoscaling.gracePeriodSeconds }}
      metricsScrapeIntervalSeconds: {{ .Values.cluster.hiveServer2.autoscaling.metricsScrapeIntervalSeconds | default 10 }}
      cpuScaleUpThreshold: {{ .Values.cluster.hiveServer2.autoscaling.cpuScaleUpThreshold | default 90 }}
      cpuScaleDownThreshold: {{ .Values.cluster.hiveServer2.autoscaling.cpuScaleDownThreshold | default 30 }}
    {{- end }}

  {{- if .Values.cluster.llapClusterRouting }}
  llapClusterRouting: {{ .Values.cluster.llapClusterRouting | quote }}
  {{- end }}

  {{- if .Values.cluster.llapClusters }}
  llapClusters:
  {{- range .Values.cluster.llapClusters }}
  - name: {{ .name }}
    enabled: {{ .enabled | default true }}
    replicas: {{ .replicas | default 2 }}
    executors: {{ .executors | default 1 }}
    memoryMb: {{ .memoryMb | default 1024 }}
    {{- if .resources }}
    resources:
      {{- toYaml .resources | nindent 6 }}
    {{- end }}
    {{- if .configOverrides }}
    configOverrides:
      {{- toYaml .configOverrides | nindent 6 }}
    {{- end }}
    {{- if .extraVolumes }}
    extraVolumes:
      {{- toYaml .extraVolumes | nindent 6 }}
    {{- end }}
    {{- if .extraVolumeMounts }}
    extraVolumeMounts:
      {{- toYaml .extraVolumeMounts | nindent 6 }}
    {{- end }}
    {{- if and .autoscaling .autoscaling.enabled }}
    autoscaling:
      enabled: true
      minReplicas: {{ .autoscaling.minReplicas }}
      scaleUpThreshold: {{ .autoscaling.scaleUpThreshold }}
      scaleUpStabilizationSeconds: {{ .autoscaling.scaleUpStabilizationSeconds }}
      scaleDownStabilizationSeconds: {{ .autoscaling.scaleDownStabilizationSeconds }}
      gracePeriodSeconds: {{ .autoscaling.gracePeriodSeconds }}
      metricsScrapeIntervalSeconds: {{ .autoscaling.metricsScrapeIntervalSeconds | default 10 }}
    {{- end }}
    {{- if .tezAm }}
    tezAm:
      replicas: {{ .tezAm.replicas | default 1 }}
      {{- if and .tezAm.autoscaling .tezAm.autoscaling.enabled }}
      autoscaling:
        enabled: true
        minReplicas: {{ .tezAm.autoscaling.minReplicas }}
        scaleUpStabilizationSeconds: {{ .tezAm.autoscaling.scaleUpStabilizationSeconds }}
        scaleDownStabilizationSeconds: {{ .tezAm.autoscaling.scaleDownStabilizationSeconds }}
        gracePeriodSeconds: {{ .tezAm.autoscaling.gracePeriodSeconds }}
        metricsScrapeIntervalSeconds: {{ .tezAm.autoscaling.metricsScrapeIntervalSeconds | default 10 }}
      {{- end }}
    {{- end }}
  {{- end }}
  {{- end }}

  tezAm:
    enabled: {{ .Values.cluster.tezAm.enabled }}
    {{- if .Values.cluster.tezAm.enabled }}
    replicas: {{ .Values.cluster.tezAm.replicas }}
    scratchStorageSize: {{ .Values.cluster.tezAm.scratchStorageSize | quote }}
    {{- if .Values.cluster.tezAm.scratchStorageClassName }}
    scratchStorageClassName: {{ .Values.cluster.tezAm.scratchStorageClassName | quote }}
    {{- end }}
    {{- if .Values.cluster.tezAm.resources }}
    resources:
      {{- toYaml .Values.cluster.tezAm.resources | nindent 6 }}
    {{- end }}
    {{- if .Values.cluster.tezAm.configOverrides }}
    configOverrides:
      {{- toYaml .Values.cluster.tezAm.configOverrides | nindent 6 }}
    {{- end }}
    {{- if .Values.cluster.tezAm.extraVolumes }}
    extraVolumes:
      {{- toYaml .Values.cluster.tezAm.extraVolumes | nindent 6 }}
    {{- end }}
    {{- if .Values.cluster.tezAm.extraVolumeMounts }}
    extraVolumeMounts:
      {{- toYaml .Values.cluster.tezAm.extraVolumeMounts | nindent 6 }}
    {{- end }}
    {{- if and .Values.cluster.tezAm.autoscaling .Values.cluster.tezAm.autoscaling.enabled }}
    autoscaling:
      enabled: true
      minReplicas: {{ .Values.cluster.tezAm.autoscaling.minReplicas }}
      scaleUpStabilizationSeconds: {{ .Values.cluster.tezAm.autoscaling.scaleUpStabilizationSeconds }}
      scaleDownStabilizationSeconds: {{ .Values.cluster.tezAm.autoscaling.scaleDownStabilizationSeconds }}
      gracePeriodSeconds: {{ .Values.cluster.tezAm.autoscaling.gracePeriodSeconds }}
      metricsScrapeIntervalSeconds: {{ .Values.cluster.tezAm.autoscaling.metricsScrapeIntervalSeconds | default 10 }}
    {{- end }}
    {{- end }}

  zookeeper:
    quorum: {{ .Values.cluster.zookeeper.quorum | quote }}

  {{- if .Values.cluster.storage.coreSiteOverrides }}
  hadoop:
    coreSiteOverrides:
      {{- toYaml .Values.cluster.storage.coreSiteOverrides | nindent 6 }}
  {{- end }}

  {{- if .Values.cluster.storage.envVars }}
  envVars:
    {{- toYaml .Values.cluster.storage.envVars | nindent 4 }}
  {{- end }}

  {{- if .Values.cluster.storage.externalJars }}
  externalJars:
    {{- toYaml .Values.cluster.storage.externalJars | nindent 4 }}
  {{- end }}

  {{- if .Values.cluster.storage.volumes }}
  volumes:
    {{- toYaml .Values.cluster.storage.volumes | nindent 4 }}
  {{- end }}

  {{- if .Values.cluster.storage.volumeMounts }}
  volumeMounts:
    {{- toYaml .Values.cluster.storage.volumeMounts | nindent 4 }}
  {{- end }}

  {{- if and .Values.cluster.autoSuspend .Values.cluster.autoSuspend.enabled }}
  autoSuspend:
    enabled: true
    idleTimeoutMinutes: {{ .Values.cluster.autoSuspend.idleTimeoutMinutes | default 15 }}
    {{- if hasKey .Values.cluster.autoSuspend "includeMetastore" }}
    includeMetastore: {{ .Values.cluster.autoSuspend.includeMetastore }}
    {{- end }}
  {{- end }}

  suspend: false
{{- end }}
