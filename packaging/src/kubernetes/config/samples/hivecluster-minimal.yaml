# Minimal HiveCluster: Metastore + HiveServer2 with external S3-compatible storage
apiVersion: hive.apache.org/v1alpha1
kind: HiveCluster
metadata:
  name: my-hive
spec:
  image: apache/hive:4.3.0-SNAPSHOT
  imagePullPolicy: IfNotPresent

  metastore:
    replicas: 1
    database:
      type: postgres
      url: "jdbc:postgresql://postgres:5432/metastore"
      driver: "org.postgresql.Driver"
      username: hive
      passwordSecretRef:
        name: hive-db-secret
        key: password
      driverJarUrl: "https://repo1.maven.org/maven2/org/postgresql/postgresql/42.7.5/postgresql-42.7.5.jar"
    warehouseDir: "s3a://hive/warehouse"

  hiveServer2:
    replicas: 1
    serviceType: ClusterIP

  zookeeper:
    quorum: "zookeeper:2181"

  # S3-compatible storage endpoint (e.g., Ozone deployed via Helm, MinIO, AWS S3).
  # See README.md for instructions on deploying Ozone via Helm.
  storage:
    endpoint: "http://ozone-s3g-rest:9878"
    bucket: hive
    accessKey: "ozone"
    secretKey: "ozone"
