# Full HiveCluster (HA): All four services with LLAP, TezAM, and multiple replicas
apiVersion: hive.apache.org/v1
kind: HiveCluster
metadata:
  name: hive
spec:
  image: apache/hive:${HIVE_VERSION}
  imagePullPolicy: IfNotPresent

  metastore:
    replicas: 2
    database:
      type: postgres
      url: "jdbc:postgresql://postgres-postgresql:5432/metastore"
      driver: "org.postgresql.Driver"
      username: hive
      passwordSecretRef:
        name: hive-db-secret
        key: password
      driverJarUrl: "https://repo1.maven.org/maven2/org/postgresql/postgresql/42.7.5/postgresql-42.7.5.jar"
    warehouseDir: "/hive/warehouse"

  hiveServer2:
    replicas: 2
    serviceType: ClusterIP
    resources:
      requestsMemory: "1Gi"
      limitsMemory: "2Gi"
    configOverrides:
      hive.server2.enable.doAs: "false"

  llap:
    enabled: true
    replicas: 2
    executors: 1
    memoryMb: 1024
    serviceHosts: "@llap0"
    resources:
      requestsMemory: "2Gi"
      limitsMemory: "3Gi"

  tezAm:
    enabled: true
    replicas: 2

  zookeeper:
    quorum: "zookeeper:2181"

  # Hadoop filesystem configuration — any storage backend (S3A, ABFS, GCS, HDFS, Ozone)
  hadoop:
    coreSiteOverrides:
      fs.defaultFS: "s3a://hive"
      fs.s3a.endpoint: "http://ozone-s3g-rest:9878"
      fs.s3a.path.style.access: "true"

  # Environment variables injected into all component pods (credentials, JVM options, etc.)
  envVars:
    - name: HADOOP_OPTIONAL_TOOLS
      value: "hadoop-aws"
    - name: AWS_ACCESS_KEY_ID
      value: "ozone"
    - name: AWS_SECRET_ACCESS_KEY
      value: "ozone"
