apiVersion: apps/v1
kind: Deployment
metadata:
  name: hive-operator
  namespace: hive-operator
  labels:
    app.kubernetes.io/name: hive-kubernetes-operator
    app.kubernetes.io/managed-by: kubectl
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: hive-kubernetes-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hive-kubernetes-operator
    spec:
      serviceAccountName: hive-operator
      containers:
        - name: hive-operator
          image: apache/hive-kubernetes-operator:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: OPERATOR_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              memory: 512Mi
